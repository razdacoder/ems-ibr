name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    env:
      # Django needs *something* set for these even though the check command
      # never actually opens DB or Redis connections.
      SECRET_KEY: ci-build-key-not-used-anywhere
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: sqlite:///${{ github.workspace }}/db.sqlite3
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: python manage.py check --deploy --fail-level WARNING || python manage.py check

      - name: Verify migrations are up to date
        run: python manage.py makemigrations --check --dry-run

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: TypeScript typecheck
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Production build
        run: npm run build

# Note: the Docker image build/push lives in docker-publish.yml. This file
# only validates source-level correctness on PRs.
