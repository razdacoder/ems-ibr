<div class="modal-header">
  <h5 class="modal-title">Change Password for {{ user_obj.first_name }} {{ user_obj.last_name }}</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'change_user_password' user_obj.id %}" hx-target="#change-pwd-alert" hx-swap="innerHTML">
  <div class="modal-body">
    <div id="change-pwd-alert"></div>
    <div class="form-group">
      <label for="new_password" class="form-label">New Password</label>
      <input type="password" id="new_password" name="new_password" class="form-control" minlength="8" required />
      <small class="form-text text-muted">Minimum 8 characters</small>
    </div>
    <div class="form-group">
      <label for="confirm_password" class="form-label">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" class="form-control" minlength="8" required />
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary d-flex gap-3 align-items-center">Change Password{% include 'dashboard/partials/loader.html' %}</button>
  </div>
</form>
