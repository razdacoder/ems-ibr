<div class="modal-header">
  <h5 class="modal-title">Edit Class</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'edit_class' class_obj.id %}" hx-target="#edit-class-alert" hx-swap="innerHTML">
  <div class="modal-body">
    <div id="edit-class-alert"></div>
    <div class="form-group">
      <label for="edit_class_name" class="form-label">Class Name</label>
      <input type="text" id="edit_class_name" name="name" class="form-control" value="{{ class_obj.name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_class_size" class="form-label">Class Size (Number of Students)</label>
      <input type="number" id="edit_class_size" name="size" class="form-control" value="{{ class_obj.size }}" min="0" required />
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary d-flex gap-3 align-items-center">Update{% include 'dashboard/partials/loader.html' %}</button>
  </div>
</form>
