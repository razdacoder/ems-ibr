<div class="modal-header">
  <h5 class="modal-title">Edit Course</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'edit_class_course' class.id course.id %}" hx-target="#edit-course-alert" hx-swap="innerHTML">
  <div class="modal-body">
    <div id="edit-course-alert"></div>
    <div class="form-group">
      <label for="edit_course_name" class="form-label">Course Name</label>
      <input type="text" id="edit_course_name" name="name" class="form-control" value="{{ course.name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_course_code" class="form-label">Course Code</label>
      <input type="text" id="edit_course_code" name="code" class="form-control" value="{{ course.code }}" required style="text-transform: uppercase;" />
    </div>
    <div class="form-group">
      <label for="edit_exam_type" class="form-label">Exam Type</label>
      <select class="form-control" name="exam_type" id="edit_exam_type" required>
        <option value="PBE" {% if course.exam_type == "PBE" %}selected{% endif %}>PBE (Paper Based Exam)</option>
        <option value="CBE" {% if course.exam_type == "CBE" %}selected{% endif %}>CBE (Computer Based Exam)</option>
      </select>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary d-flex gap-3 align-items-center">Update{% include 'dashboard/partials/loader.html' %}</button>
  </div>
</form>
