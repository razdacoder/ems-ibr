<div class="modal-header">
  <h5 class="modal-title">Edit Student</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'edit_student' student.id %}" hx-target="#edit-student-alert" hx-swap="innerHTML">
  <div class="modal-body">
    <div id="edit-student-alert"></div>
    <div class="form-group">
      <label for="edit_student_first_name" class="form-label">First Name</label>
      <input type="text" id="edit_student_first_name" name="first_name" class="form-control" value="{{ student.first_name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_student_last_name" class="form-label">Last Name</label>
      <input type="text" id="edit_student_last_name" name="last_name" class="form-control" value="{{ student.last_name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_student_matric_no" class="form-label">Matric Number</label>
      <input type="text" id="edit_student_matric_no" name="matric_no" class="form-control" value="{{ student.matric_no }}" required style="text-transform: uppercase;" />
    </div>
    <div class="form-group">
      <label for="edit_student_email" class="form-label">Email</label>
      <input type="email" id="edit_student_email" name="email" class="form-control" value="{{ student.email }}" />
    </div>
    <div class="form-group">
      <label for="edit_student_phone" class="form-label">Phone Number</label>
      <input type="text" id="edit_student_phone" name="phone" class="form-control" value="{{ student.phone }}" />
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary d-flex gap-3 align-items-center">Update{% include 'dashboard/partials/loader.html' %}</button>
  </div>
</form>
