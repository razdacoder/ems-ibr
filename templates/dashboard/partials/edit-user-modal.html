<div class="modal-header">
  <h5 class="modal-title">Edit User</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form hx-post="{% url 'edit_user' user_obj.id %}" hx-target="#edit-user-alert" hx-swap="innerHTML">
  <div class="modal-body">
    <div id="edit-user-alert"></div>
    <div class="form-group">
      <label for="edit_first_name" class="form-label">Firstname</label>
      <input type="text" id="edit_first_name" name="first_name" class="form-control" value="{{ user_obj.first_name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_last_name" class="form-label">Lastname</label>
      <input type="text" id="edit_last_name" name="last_name" class="form-control" value="{{ user_obj.last_name }}" required />
    </div>
    <div class="form-group">
      <label for="edit_email" class="form-label">Email</label>
      <input type="email" id="edit_email" name="email" class="form-control" value="{{ user_obj.email }}" required />
    </div>
    <div class="form-group">
      <label for="edit_department" class="form-label">Department</label>
      <select class="form-control-sm form-control" name="department" id="edit_department" {% if user_obj.is_staff %}disabled{% endif %}>
        <option value="">-- Select Department --</option>
        {% for department in departments %}
          <option value="{{ department.slug }}" {% if user_obj.department.id == department.id %}selected{% endif %}>{{ department.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
        <input type="checkbox" class="form-check-input" id="edit_is_staff" name="is_staff" {% if user_obj.is_staff %}checked{% endif %} onchange="toggleDepartment(this)">
        <label class="form-check-label" for="edit_is_staff">Admin User</label>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-primary d-flex gap-3 align-items-center">Update{% include 'dashboard/partials/loader.html' %}</button>
  </div>
</form>

<script>
  function toggleDepartment(checkbox) {
    const deptSelect = document.getElementById('edit_department');
    if (checkbox.checked) {
      deptSelect.disabled = true;
      deptSelect.value = '';
    } else {
      deptSelect.disabled = false;
    }
  }
</script>
