<!-- Job Started Template -->
<div
  id="job-progress-container"
  hx-get="/check-job-status/{{ job_id }}/"
  hx-trigger="every 2s"
  hx-swap="outerHTML"
>
  <div class="alert alert-info">
    <div class="d-flex align-items-center">
      <div class="spinner-border spinner-border-sm me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="flex-grow-1">
        <h5 class="alert-heading mb-1">{{ job_type }} Started</h5>
        <p class="mb-0">
          Your request is being processed in the background. This page will
          update automatically.
        </p>
      </div>
    </div>
    <div class="progress mt-3" style="height: 25px">
      <div
        class="progress-bar progress-bar-striped progress-bar-animated"
        role="progressbar"
        style="width: 0%"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        0%
      </div>
    </div>
  </div>
</div>

<script>
  document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'job-progress-container') {
          var data = JSON.parse(evt.detail.xhr.response);

          if (data.status === 'success') {
              // Job completed successfully
              setTimeout(function() {
                  {% if redirect_url %}
                  window.location.href = "{{ redirect_url }}";
                  {% else %}
                  window.location.reload();
                  {% endif %}
              }, 2000);
          }
      }
  });
</script>
